# ====== 按地区自动测速节点组 ======
香港 = url-test,server-tag-regex=(?=.*(港|HK|(?i)Hong))^((?!(台湾|日本|新加坡|美国|韩国|US|SG|JP|KR|TW)).)*$,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
台湾 = url-test,server-tag-regex=(?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
日本 = url-test,server-tag-regex=(?=.*(日本|JP|(?i)Japan))^((?!(香港|台湾|新加坡|美国|韩国|US|SG|KR|HK|TW)).)*$,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
新加坡 = url-test,server-tag-regex=(?=.*(新加坡|狮城|SG|(?i)Singapore))^((?!(香港|台湾|日本|美国|韩国|US|JP|KR|HK|TW)).)*$,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
韩国 = url-test,server-tag-regex=(?=.*(KR|Korea|KOR|首尔|韩|韓|(?i)Korea))^((?!(香港|台湾|新加坡|美国|US|SG|HK|TW)).)*$,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png
美国 = url-test,server-tag-regex=(?=.*(美国|美國|US|洛杉矶|西雅图|(?i)States|American))^((?!(香港|台湾|日本|新加坡|韩国|SG|JP|KR|HK|TW)).)*$,url=http://www.gstatic.com/generate_204,interval=300,tolerance=50,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png


