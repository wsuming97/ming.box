# Gemini（Google AI）— 相对宽松，日本/美国均可
💎 Gemini = select,PROXY,日本,美国,新加坡,香港,台湾,韩国,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png

# OpenAI（ChatGPT / GPT / DALL-E / Sora）— 封 HK
🤖 OpenAI = select,PROXY,美国,日本,新加坡,台湾,韩国,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png

