;==============================================================
; Quantumult X - AI 专用配置 v1
; 基于毒奶 + w37fhy 二次整合定制
; 特性：AI 服务独立分流 / 防 DNS 泄露 / 按地区自动测速 / TikTok 解锁 / 流媒体分流
; 作者：wsuming97  日期：2026-04-15
; 使用：圈X → ⚙️ → 配置文件 → 下载 → 粘贴此文件 Raw 链接
;==============================================================

[general]

; 资源解析器（必须，用于转换订阅格式）
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

; IP 查询 API（主页显示 IP 归属地）
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/limbopro/QuantumultX/master/Scripts/IP_API.js

; 节点延迟测试 URL
server_check_url=http://www.gstatic.com/generate_204

; 节点测速超时（毫秒）
server_check_timeout=3000

; DNS 排除列表（这些域名不使用 fake-ip 或自定义 DNS）
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn

; UDP 回退策略：不支持 UDP 的节点直接拒绝（防泄露）
fallback_udp_policy=reject

; UDP 丢弃列表（屏蔽 STUN/QUIC，防 WebRTC 泄露）
udp_drop_list=1900, 80, STUN, QUIC

; ICMP 自动回复
icmp_auto_reply=true


[dns]

; ====== 防 DNS 泄露核心配置 ======
; 禁用系统 DNS（防止运营商 DNS 泄露，这是圈X 防泄露的关键开关）
no-system

; 禁用 IPv6 DNS（防止 IPv6 泄露真实位置）
no-ipv6

; 主 DNS：国内加密 DoH（解析国内域名快，全程加密运营商看不到）
doh-server=https://doh.pub/dns-query,https://dns.alidns.com/dns-query

; AI 域名走海外加密 DNS（防止被国内 DNS 污染返回错误 IP）
server=/anthropic.com/1.1.1.1
server=/claude.ai/1.1.1.1
server=/openai.com/1.1.1.1
server=/chatgpt.com/1.1.1.1
server=/generativelanguage.googleapis.com/1.1.1.1
server=/gemini.google.com/1.1.1.1


[policy]

; ====== AI 服务独立策略组（核心定制）======
; 每个 AI 服务独立选择节点，某个 IP 被风控不影响其他

; Claude（Anthropic）— 风控最严格，默认走美国节点
static=🧠 Claude, PROXY, 美国, 日本, 新加坡, 香港, 台湾, 韩国, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bot.png

; Gemini（Google AI）— 相对宽松，默认走日本节点
static=💎 Gemini, PROXY, 日本, 美国, 新加坡, 香港, 台湾, 韩国, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png

; OpenAI（ChatGPT / GPT / DALL-E / Sora）— 封 HK，建议日本/美国
static=🤖 OpenAI, PROXY, 美国, 日本, 新加坡, 台湾, 韩国, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png

